version: '3'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports: 
      - "5672:5672"
      - "15672:15672"
    networks:
      - rabbit
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  master: 
    build: for_Master/.
    
    # creating volume to get histogram on machine
    volumes:
      - ./data:/app/data
    networks: 
      - rabbit

    depends_on:
      rabbitmq:
        condition: service_healthy
        restart: true
    command: python master.py

  


  worker:
    build: for_Worker/.
    networks:
      - rabbit
  
    depends_on:
      rabbitmq:
        condition: service_healthy
        restart: true
    command: python worker.py
  
networks:
  rabbit:
    driver: overlay
    attachable: true


